<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sannpp ❤️</title>
<style>
body {
  margin:0;
  font-family:Arial,sans-serif;
  background: linear-gradient(135deg, #ffe6f0 0%, #ffd9e8 50%, #ffcce0 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  color:#4d0033;
}
h1 {
  font-size:32px;
  font-weight:bold;
  text-shadow:0 0 5px #ff99cc,0 0 10px #ff6699;
}
</style>
</head>
<body>
<audio id="bgmusic" src="love.mp3" loop></audio>

<h1 id="message">Tap anywhere to start 💖</h1>

<script>
let slides = [
  "Happy Birthday My Beautiful Sannpp 🎂❤️",
  "You make me smile even on my worst days 😊\nYou are my peace, my happiness, my everything 💕",
  "Happy Birthday Sannpp 🎂❤️\nForever Yours,\nMungeesa"
];

let current = 0;
let typing=false;

function showSlide(){
  if(typing) return;
  let msgEl = document.getElementById("message");
  let text = slides[current];
  msgEl.innerHTML="";
  typing=true;
  let i=0;
  function typeChar(){
    if(i<text.length){
      msgEl.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typeChar,40);
    } else {
      typing=false;
      current++;
      if(current>=slides.length) current=slides.length-1; // stop at last
    }
  }
  typeChar();
}

document.body.addEventListener("click",()=>{
  document.getElementById("bgmusic").play().catch(()=>{});
  showSlide();
});
</script>
</body>
</html>
