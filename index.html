<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sannpp ❤️</title>
<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  overflow:hidden;
  background: linear-gradient(135deg, #ffe6f0 0%, #ffd9e8 50%, #ffcce0 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  color:#4d0033;
}
.container {
  position: relative;
  z-index:2;
  padding:20px;
  max-width:90%;
}
.glow {
  font-size:28px;
  font-weight:bold;
  text-shadow:0 0 5px #ff99cc,0 0 10px #ff6699;
  opacity:0;
  transition: opacity 1s;
}
/* Floating hearts */
.heart, .bgheart {
  position:absolute;
  color:#ff6699;
  font-size:20px;
  animation:float 8s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0.5); opacity:0.5;}
  50%{opacity:0.7;}
  100%{transform:translateY(-10vh) scale(1); opacity:0;}
}
/* Fireworks */
.spark {
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  opacity:1;
}
button {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff4e8a;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 10px #ff4e8a;
}
button:hover { transform:scale(1.05); }
</style>
</head>
<body>
<audio id="bgmusic" src="love.mp3" loop></audio>

<div class="container" id="container">
  <h1 class="glow">Happy Birthday Sannpp 🎂❤️</h1>
  <h2 class="glow">Tap anywhere to start 💖</h2>
</div>

<script>
let currentSlide = -1;
let typing = false;

const messages = [
  "Happy Birthday My Beautiful Sannpp 🎂❤️",
  "You make me smile even on my worst days 😊\nYou are my peace, my happiness, my everything 💕",
  "Every moment with you feels magical ✨\nBeing your first love is the greatest gift of my life 💖",
  "I promise to protect you, support you, and love you always 🤍\nNo matter what life brings, I am yours ♾️",
  "Happy Birthday Sannpp 🎂❤️\nI Love You So Much 💖\nYou make my life beautiful every single day 🌸\nWill you stay with me forever? 💍\nForever Yours,\nMungeesa"
];

/* Background hearts */
function createBgHearts(){
  setInterval(()=>{
    const heart=document.createElement("div");
    heart.className="bgheart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(10+Math.random()*15)+"px";
    heart.style.animationDuration=(6+Math.random()*6)+"s";
    heart.style.opacity=0.3+Math.random()*0.4;
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),12000);
  },500);
}

/* Floating hearts */
function createHearts(){
  for(let i=0;i<35;i++){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*4)+"s";
    document.body.appendChild(heart);
  }
}

/* Fireworks */
function createFireworks(){
  const colors=["#ff4e8a","#ff99cc","#ffe6f0","#ffb3d9","#ffffff"];
  for(let i=0;i<30;i++){
    const spark=document.createElement("div");
    spark.className="spark";
    spark.style.background=colors[Math.floor(Math.random()*colors.length)];
    spark.style.left=Math.random()*100+"vw";
    spark.style.top=Math.random()*100+"vh";
    document.body.appendChild(spark);

    let angle=Math.random()*2*Math.PI;
    let distance=50+Math.random()*100;
    let x=0,y=0;
    const id=setInterval(()=>{
      x+=Math.cos(angle)*2;
      y+=Math.sin(angle)*2;
      spark.style.transform=`translate(${x}px,${y}px) scale(${1-(Math.abs(x)+Math.abs(y))/distance})`;
      spark.style.opacity=1-(Math.abs(x)+Math.abs(y))/distance;
      if(Math.abs(x)+Math.abs(y)>distance){spark.remove(); clearInterval(id);}
    },16);
  }
}

/* Typing effect with callback */
function typeEffect(element, text, callback){
  typing = true;
  element.innerHTML = "";
  let lines = text.split("\n");
  let lineIndex = 0;

  function typeLine(){
    if(lineIndex >= lines.length){
      typing = false;
      if(callback) callback();
      return;
    }
    let line = lines[lineIndex];
    let charIndex = 0;
    function typeChar(){
      if(charIndex < line.length){
        element.innerHTML += line.charAt(charIndex);
        charIndex++;
        setTimeout(typeChar, 40);
      } else {
        element.innerHTML += "<br>";
        lineIndex++;
        typeLine();
      }
    }
    typeChar();
  }
  typeLine();
}

/* Show next slide */
function nextSlide(){
  if(typing) return; // prevent skipping while typing
  currentSlide++;
  const container=document.getElementById("container");
  if(currentSlide === 0){
    document.getElementById("bgmusic").play().catch(()=>{});
    createBgHearts();
  }
  if(currentSlide < messages.length - 1){
    typeEffect(container, messages[currentSlide]);
  } else {
    typeEffect(container, messages[currentSlide]);
    createHearts();
    createFireworks();
  }
}

// Advance slides on tap
document.body.addEventListener("click", function(){
  nextSlide();
});
</script>
</body>
</html>
