<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sannpp ❤️</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  overflow:hidden;
  background: linear-gradient(135deg, #ffe6f0 0%, #ffd9e8 50%, #ffcce0 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  color:#4d0033;
}
.container {
  position: relative;
  z-index:2;
  padding:20px;
  max-width:90%;
}
.message {
  font-size:28px;
  font-weight:bold;
  text-shadow: 0 0 5px #ff99cc,0 0 10px #ff6699;
  opacity:0;
  transition: opacity 1s;
}
/* Hearts */
.heart, .bgheart {
  position:absolute;
  color:#ff6699;
  font-size:20px;
  animation:float 8s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0.5); opacity:0.5;}
  50%{opacity:0.7;}
  100%{transform:translateY(-10vh) scale(1); opacity:0;}
}
/* Fireworks sparks */
.spark {
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  opacity:1;
}
</style>
</head>
<body>
<audio id="bgmusic" src="love.mp3" loop></audio>

<div class="container" id="container">
  <div class="message" id="message">Tap anywhere to start 💖</div>
</div>

<script>
let currentSlide = -1;
let typing = false;

const messages = [
  "Happy Birthday My Beautiful Sannpp 🎂❤️",
  "You make me smile even on my worst days 😊\nYou are my peace, my happiness, my everything 💕",
  "Every moment with you feels magical ✨\nBeing your first love is the greatest gift of my life 💖",
  "I promise to protect you, support you, and love you always 🤍\nNo matter what life brings, I am yours ♾️",
  "Happy Birthday Sannpp 🎂❤️\nI Love You So Much 💖\nYou make my life beautiful every single day 🌸\nForever Yours,\nMungeesa"
];

/* Background floating hearts */
function createBgHearts(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.className="bgheart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100 + "vw";
    heart.style.fontSize = (10 + Math.random()*15) + "px";
    heart.style.animationDuration = (6 + Math.random()*6) + "s";
    heart.style.opacity = 0.3 + Math.random()*0.4;
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),12000);
  },500);
}

/* Fireworks */
function createFireworks(){
  const colors=["#ff4e8a","#ff99cc","#ffe6f0","#ffb3d9","#ffffff"];
  for(let i=0;i<30;i++){
    let spark = document.createElement("div");
    spark.className="spark";
    spark.style.background = colors[Math.floor(Math.random()*colors.length)];
    spark.style.left = Math.random()*100 + "vw";
    spark.style.top = Math.random()*100 + "vh";
    document.body.appendChild(spark);

    let angle=Math.random()*2*Math.PI;
    let distance=50+Math.random()*100;
    let x=0,y=0;
    let id=setInterval(()=>{
      x+=Math.cos(angle)*2;
      y+=Math.sin(angle)*2;
      spark.style.transform = `translate(${x}px,${y}px) scale(${1-(Math.abs(x)+Math.abs(y))/distance})`;
      spark.style.opacity = 1-(Math.abs(x)+Math.abs(y))/distance;
      if(Math.abs(x)+Math.abs(y)>distance){spark.remove(); clearInterval(id);}
    },16);
  }
}

/* Typing effect */
function typeEffect(el, text, callback){
  typing = true;
  el.innerHTML = "";
  let lines = text.split("\n");
  let lineIndex=0;

  function typeLine(){
    if(lineIndex>=lines.length){
      typing=false;
      if(callback) callback();
      return;
    }
    let line=lines[lineIndex];
    let charIndex=0;
    function typeChar(){
      if(charIndex<line.length){
        el.innerHTML += line.charAt(charIndex);
        charIndex++;
        setTimeout(typeChar,40);
      } else {
        el.innerHTML += "<br>";
        lineIndex++;
        typeLine();
      }
    }
    typeChar();
  }
  typeLine();
}

/* Next slide */
function nextSlide(){
  if(typing) return;
  currentSlide++;
  const el=document.getElementById("message");
  if(currentSlide===0){
    document.getElementById("bgmusic").play().catch(()=>{});
    createBgHearts();
  }
  if(currentSlide<messages.length-1){
    typeEffect(el,messages[currentSlide]);
  } else {
    typeEffect(el,messages[currentSlide]);
    createFireworks();
  }
}

document.body.addEventListener("click",()=>{
  nextSlide();
});
</script>
</body>
</html>
